services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      FRONTEND_URL: https://localhost
    volumes:
      - ./data:/app/data:z
      - ./uploads:/app/uploads:z
    networks:
      - app
    restart: unless-stopped

  frontend:
    build:
      context: ./srcs/frontend
      dockerfile: Dockerfile
    ports:
      - "443:443"
      - "80:80"
    depends_on:
      - backend
    networks:
      - app
    restart: unless-stopped

networks:
  app:
    driver: bridge
